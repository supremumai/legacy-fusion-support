<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy Fusion — Control Center</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/control.css" />
</head>
<body>

  <!-- =====================================================================
       Agent Login Screen (hidden after auth)
       ===================================================================== -->
  <div class="login-screen" id="agentLogin">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="login-glyph">⬡</span>
      </div>
      <h1 class="login-title">Agent <span class="text-cyan">Control Center</span></h1>
      <p class="login-subtitle">Sign in with your agent credentials.</p>

      <div id="agentLoginForm">
        <input type="email"    id="agentEmail"    class="login-input" placeholder="agent@legacyfusion.ai" autocomplete="email" />
        <input type="password" id="agentPassword" class="login-input" placeholder="Password" autocomplete="current-password" />
        <button class="btn-gold login-btn" id="agentLoginBtn">Sign In</button>
        <p class="login-error hidden" id="agentLoginError"></p>
      </div>

      <!-- Access denied state -->
      <div class="login-denied hidden" id="agentDenied">
        <span class="denied-icon">🔒</span>
        <p class="confirm-text">Access denied — agent role required.</p>
        <button class="btn-cyan login-btn" id="agentDeniedRetry">Try another account</button>
      </div>
    </div>
  </div>

  <!-- =====================================================================
       Control App Shell — 3-panel layout (hidden until auth)
       ===================================================================== -->
  <div class="control-app hidden" id="controlApp">

    <!-- SIDEBAR -->
    <aside class="cc-sidebar" id="ccSidebar">

      <!-- Top actions -->
      <div class="cc-sidebar-actions">
        <button class="cc-new-ticket-btn" onclick="openNewTicketModal()">+ New Ticket</button>
        <button class="cc-pipeline-btn" id="pipeline-toggle-btn">⬡ Pipeline</button>
        <div class="cc-sidebar-util">
          <span class="live-badge">
            <span class="live-dot"></span>
            Live
          </span>
          <button class="refresh-btn" id="refreshTicketsBtn" title="Refresh tickets">↻</button>
          <button class="btn-signout" id="signOutBtn" title="Sign out">↩</button>
        </div>
      </div>

      <!-- Filters section -->
      <div class="cc-sidebar-section">
        <div class="cc-section-label">Filters</div>
        <div class="queue-section">
          <button class="queue-item active" data-filter="unassigned" data-value="unassigned">
            <span>Unassigned</span>
            <span class="filter-count badge-pill" id="count-unassigned">0</span>
          </button>
        </div>
        <div id="filter-group-priority"></div>
        <div id="filter-group-category"></div>
        <div id="filter-group-status"></div>
        <div id="filter-group-source"></div>
        <div class="cc-section-label" style="margin-top:4px">Account</div>
        <div id="accountFilters"></div>
      </div>

      <!-- Tickets section -->
      <div class="cc-sidebar-section cc-tickets-section">
        <div class="cc-section-label">
          Tickets
          <span class="cc-ticket-count" id="ccTicketCount">0</span>
        </div>
        <div class="ticket-list" id="ticketList">
          <!-- Ticket rows injected by JS -->
        </div>
      </div>

    </aside>

    <!-- MAIN AREA -->
    <main class="cc-main" id="ccMain">

      <!-- Empty state -->
      <div class="workspace-empty glass-card" id="workspaceEmpty">
        <span class="empty-glyph">⬡</span>
        <p class="empty-label">Select a ticket to view the workspace</p>
      </div>

      <!-- Workspace content -->
      <div class="workspace-content hidden cc-workspace" id="workspaceContent">

        <!-- Workspace header -->
        <div class="workspace-header glass-card">
          <div class="workspace-header-left">
            <span class="ws-ticket-id" id="wsTicketId">T-000000</span>
            <span class="ws-subject" id="wsSubject">Loading…</span>
            <div id="wsPills" class="ws-pills-row"></div>
          </div>
          <div class="workspace-header-actions">
            <button class="btn-cyan ws-action-btn" id="btnAssign">Assign</button>
            <!-- Stage dropdown injected by loadWorkspace() -->
          </div>
        </div>

        <!-- AI Summary card -->
        <div class="ai-summary-card glass-card" id="aiSummaryCard">
          <div class="ai-card-header">
            <span class="ai-label">AI</span>
            <span class="ai-card-title">LegacyZero Analysis</span>
          </div>
          <div class="ai-metrics-grid">
            <div class="ai-metric">
              <span class="metric-label">Category</span>
              <span class="metric-value" id="aiCategory">—</span>
            </div>
            <div class="ai-metric">
              <span class="metric-label">Priority</span>
              <span class="metric-value" id="aiPriority">—</span>
            </div>
            <div class="ai-metric">
              <span class="metric-label">SLA Deadline</span>
              <span class="metric-value" id="aiSLA">—</span>
            </div>
          </div>
          <p class="ai-summary-text" id="aiSummaryText">Analyzing conversation…</p>
        </div>

        <!-- Conversation thread -->
        <div class="ws-thread" id="wsThread"></div>

        <!-- Reply input area -->
        <div class="ws-input-area">
          <textarea
            id="wsReplyInput"
            class="chat-textarea"
            placeholder="Type a reply…"
            rows="2"
          ></textarea>
          <div class="ws-input-actions">
            <button class="btn-cyan ws-action-btn" id="btnAddNote">Add note</button>
            <button class="btn-gold ws-action-btn" id="btnSendReply">Send reply</button>
          </div>
        </div>

      </div><!-- /.cc-workspace -->

    </main>

  </div><!-- /.control-app -->

  <!-- ===================================================================== -->

  <script type="module" src="./control.ts"></script>
</body>
</html>
