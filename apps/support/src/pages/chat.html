<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy Fusion Support</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/chat.css" />
</head>
<body>

  <!-- =====================================================================
       Login Screen (hidden after auth)
       ===================================================================== -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="login-glyph">⬡</span>
      </div>
      <h1 class="login-title"><span class="text-gold">LegacyZero</span> Support</h1>
      <p class="login-subtitle">Enter your email to get started — we'll send you a magic link.</p>

      <!-- Email input state -->
      <div id="loginInputState">
        <input
          type="email"
          id="loginEmail"
          class="login-input"
          placeholder="your@email.com"
          autocomplete="email"
        />
        <button class="btn-gold login-btn" id="loginSendBtn">
          Send Magic Link
        </button>
        <p class="login-error hidden" id="loginError"></p>
      </div>

      <!-- Confirmation state (shown after send) -->
      <div class="login-confirm hidden" id="loginConfirm">
        <span class="confirm-icon">✉️</span>
        <p class="confirm-text">Check your email — your magic link is on the way.</p>
      </div>
    </div>
  </div>

  <!-- =====================================================================
       App Shell (hidden until auth)
       ===================================================================== -->
  <div class="chat-app hidden" id="chatApp">

    <!-- -----------------------------------------------------------------
         Sidebar
         ----------------------------------------------------------------- -->
    <aside class="chat-sidebar glass-card" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-brand">
          <span class="brand-dot"></span>
          My Tickets
        </span>
        <button class="btn-signout" id="signOutBtn" title="Sign out">↩</button>
      </div>

      <div class="sidebar-group" id="sidebar-open">
        <div class="sidebar-group-label">Open</div>
        <!-- Ticket rows injected by JS -->
      </div>

      <div class="sidebar-group" id="sidebar-waiting">
        <div class="sidebar-group-label">Waiting</div>
      </div>

      <div class="sidebar-group" id="sidebar-resolved">
        <div class="sidebar-group-label">Resolved</div>
      </div>
    </aside>

    <!-- -----------------------------------------------------------------
         Main area
         ----------------------------------------------------------------- -->
    <main class="chat-main">

      <!-- ---------------------------------------------------------------
           Welcome State (shown when no active ticket)
           --------------------------------------------------------------- -->
      <section class="welcome-state" id="welcomeState">
        <div class="welcome-content glass-card">
          <div class="welcome-logo">
            <span class="welcome-glyph">⬡</span>
          </div>
          <h1 class="welcome-title">Hi, I'm <span class="text-gold">LegacyZero</span></h1>
          <p class="welcome-subtitle">Tell me what's going on — I'll help you right away.</p>

          <div class="welcome-input-wrap" id="welcomeInputWrap">
            <textarea
              id="welcomeInput"
              class="chat-textarea"
              placeholder="Describe your issue..."
              rows="3"
            ></textarea>
            <button class="btn-gold send-btn" id="welcomeSendBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send
            </button>
          </div>
        </div>
      </section>

      <!-- ---------------------------------------------------------------
           Thread Mode (shown when a ticket is active)
           --------------------------------------------------------------- -->
      <section class="thread-state hidden" id="threadState">

        <!-- Top bar -->
        <div class="thread-topbar glass-card">
          <div class="topbar-left">
            <span class="ticket-id-label" id="activeTicketId">T-000000</span>
            <span class="ticket-subject" id="activeTicketSubject">Loading…</span>
          </div>
          <div class="topbar-right">
            <span class="sla-badge badge-pill text-gold" id="slaBadge">SLA: —</span>
          </div>
        </div>

        <!-- Message thread -->
        <div class="message-thread" id="messageThread">
          <!-- Message bubbles injected by JS -->
        </div>

        <!-- Quick action pills -->
        <div class="quick-actions" id="quickActions">
          <button class="quick-pill" data-prompt="Billing issue">Billing issue</button>
          <button class="quick-pill" data-prompt="Report a bug">Report a bug</button>
          <button class="quick-pill" data-prompt="Need help">Need help</button>
          <button class="quick-pill" data-prompt="Talk to human">Talk to human</button>
        </div>

        <!-- Input bar -->
        <div class="chat-input-bar">
          <textarea
            id="threadInput"
            class="chat-textarea"
            placeholder="Type a message…"
            rows="1"
          ></textarea>
          <button class="btn-gold send-btn" id="threadSendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send
          </button>
        </div>

      </section>

    </main>
  </div><!-- /.chat-app -->

  <!-- =====================================================================
       Inline Script
       ===================================================================== -->
  <script>
    // -----------------------------------------------------------------------
    // Demo mode guard — runtime URL param detection
    // Demo mode when: contactId=contact-marco OR locationId=location-demo
    // This avoids relying on build-time env vars that aren't available at runtime.
    // -----------------------------------------------------------------------
    const _urlParams   = new URLSearchParams(window.location.search);
    const _contactId   = _urlParams.get('contactId');
    const _locationId  = _urlParams.get('locationId');
    const IS_DEMO = _contactId === 'contact-marco' || _locationId === 'location-demo' || (!_contactId && !_locationId);

    // -----------------------------------------------------------------------
    // Auth — customer (magic link)
    // -----------------------------------------------------------------------
    let currentContactId = null;  // set after auth, scopes GHL queries
    let currentLocationId = 'location-demo'; // default; overwritten after auth

    async function initAuth() {
      if (IS_DEMO) {
        currentContactId  = 'contact-marco';
        currentLocationId = 'location-demo';
        showApp();
        return;
      }

      // Use pre-parsed URL params (contactId / locationId from GHL custom menu)
      if (!_contactId || !_locationId) {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginInputState').classList.add('hidden');
        document.getElementById('loginConfirm').classList.add('hidden');
        const denied = document.createElement('div');
        denied.className = 'login-denied';
        denied.innerHTML = '<span class="denied-icon">🔒</span><p class="confirm-text">Access denied — missing identity parameters.</p>';
        document.querySelector('.login-card').appendChild(denied);
        document.getElementById('chatApp').classList.add('hidden');
        return;
      }

      currentContactId  = _contactId;
      currentLocationId = _locationId;
      showApp();
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('chatApp').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('chatApp').classList.remove('hidden');
    }

    // Magic link send
    document.getElementById('loginSendBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');
      errorEl.textContent = '';

      if (!email) {
        errorEl.textContent = 'Please enter your email address.';
        errorEl.classList.remove('hidden');
        return;
      }

      document.getElementById('loginSendBtn').disabled = true;

      try {
        const { sendMagicLink } = await import('../services/supabase.ts');
        await sendMagicLink(email);
        document.getElementById('loginInputState').classList.add('hidden');
        document.getElementById('loginConfirm').classList.remove('hidden');
      } catch (err) {
        errorEl.textContent = err.message ?? 'Something went wrong. Please try again.';
        errorEl.classList.remove('hidden');
        document.getElementById('loginSendBtn').disabled = false;
      }
    });

    // Enter key on email input
    document.getElementById('loginEmail').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginSendBtn').click();
    });

    // Sign out
    document.getElementById('signOutBtn').addEventListener('click', async () => {
      if (IS_DEMO) return;
      const { signOut } = await import('../services/supabase.ts');
      await signOut();
      location.reload();
    });

    // -----------------------------------------------------------------------
    // Demo seed data (5 tickets, non-internal messages only)
    // Full data wired in Batch 10.
    // -----------------------------------------------------------------------
    const DEMO_DATA = {
      tickets: [
        {
          id: 'T-DEMO01', ghlOpportunityId: 'opp-01',
          title: 'Automation not triggering on new lead',
          status: 'in_progress', priority: 'high', category: 'technical',
          slaDeadline: new Date(Date.now() + 4 * 60 * 60 * 1000),
        },
        {
          id: 'T-DEMO02', ghlOpportunityId: 'opp-02',
          title: 'Invoice shows incorrect amount',
          status: 'waiting_client', priority: 'medium', category: 'billing',
          slaDeadline: new Date(Date.now() + 20 * 60 * 60 * 1000),
        },
        {
          id: 'T-DEMO03', ghlOpportunityId: 'opp-03',
          title: 'How do I add a team member?',
          status: 'resolved', priority: 'low', category: 'general',
          slaDeadline: new Date(Date.now() - 2 * 60 * 60 * 1000),
        },
        {
          id: 'T-DEMO04', ghlOpportunityId: 'opp-04',
          title: 'Pipeline stage not updating after call',
          status: 'new', priority: 'urgent', category: 'technical',
          slaDeadline: new Date(Date.now() + 1 * 60 * 60 * 1000),
        },
        {
          id: 'T-DEMO05', ghlOpportunityId: 'opp-05',
          title: 'Need to cancel current plan',
          status: 'waiting_internal', priority: 'medium', category: 'billing',
          slaDeadline: new Date(Date.now() + 12 * 60 * 60 * 1000),
        },
      ],
      messages: {
        'T-DEMO01': [
          { id: 'm1', role: 'ai',     content: 'Hi! I\'m LegacyZero. I see you\'re having trouble with automation triggers. Can you tell me which workflow is affected?', isInternal: false, createdAt: new Date(Date.now() - 30 * 60000) },
          { id: 'm2', role: 'client', content: 'The "New Lead — Send Welcome Email" workflow. It stopped firing about 2 hours ago.', isInternal: false, createdAt: new Date(Date.now() - 28 * 60000) },
          { id: 'm3', role: 'ai',     content: 'Got it. I\'ve flagged this as high priority and created a ticket. An agent will review the workflow logs and follow up shortly.', isInternal: false, createdAt: new Date(Date.now() - 27 * 60000) },
          { id: 'm4', role: 'agent',  content: 'I can see the workflow was paused by a system update. Re-enabling it now — should be firing within 5 minutes.', isInternal: false, createdAt: new Date(Date.now() - 10 * 60000) },
        ],
        'T-DEMO04': [
          { id: 'm5', role: 'ai',     content: 'This looks urgent — pipeline stages not updating can block your whole team. Is this happening on all contacts or a specific one?', isInternal: false, createdAt: new Date(Date.now() - 5 * 60000) },
          { id: 'm6', role: 'client', content: 'All contacts after a logged call. The stage just stays where it was.', isInternal: false, createdAt: new Date(Date.now() - 3 * 60000) },
        ],
      },
    };

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let activeTicketId = null;
    let activeChannel = null;        // current Supabase realtime channel
    const renderedMsgIds = new Set(); // dedup guard — prevents realtime echo double-render

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function statusGroup(status) {
      if (['new', 'triaged', 'in_progress', 'escalated'].includes(status)) return 'open';
      if (['waiting_client', 'waiting_internal'].includes(status))          return 'waiting';
      return 'resolved';
    }

    function statusBadgeClass(status) {
      const group = statusGroup(status);
      if (group === 'open')     return 'badge-cyan';
      if (group === 'waiting')  return 'badge-gold';
      return 'badge-green';
    }

    function slaLabel(deadline) {
      const ms = new Date(deadline) - Date.now();
      if (ms < 0) return 'SLA: Overdue';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      return h > 0 ? `SLA: ${h}h ${m}m` : `SLA: ${m}m`;
    }

    function formatTime(date) {
      return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // -----------------------------------------------------------------------
    // Render sidebar
    // -----------------------------------------------------------------------
    function renderSidebar(tickets) {
      const groups = { open: [], waiting: [], resolved: [] };
      tickets.forEach(t => groups[statusGroup(t.status)].push(t));

      ['open', 'waiting', 'resolved'].forEach(group => {
        const container = document.getElementById(`sidebar-${group}`);
        // Keep the label, clear rows
        const label = container.querySelector('.sidebar-group-label');
        container.innerHTML = '';
        container.appendChild(label);

        groups[group].forEach(ticket => {
          const row = document.createElement('button');
          row.className = 'sidebar-ticket-row' + (ticket.id === activeTicketId ? ' active' : '');
          row.dataset.ticketId = ticket.id;
          row.innerHTML = `
            <span class="ticket-row-id">${ticket.id}</span>
            <span class="ticket-row-subject">${ticket.title}</span>
            <span class="badge-pill ${statusBadgeClass(ticket.status)} ticket-row-badge">${ticket.status.replace('_', ' ')}</span>
          `;
          row.addEventListener('click', () => loadTicket(ticket));
          container.appendChild(row);
        });
      });
    }

    // -----------------------------------------------------------------------
    // Render message thread
    // -----------------------------------------------------------------------
    function renderThread(messages) {
      const thread = document.getElementById('messageThread');
      thread.innerHTML = '';
      messages.forEach(msg => {
        const el = document.createElement('div');
        el.className = `message-bubble bubble-${msg.role}`;
        el.innerHTML = `
          <div class="bubble-content">${msg.content}</div>
          <div class="bubble-meta">${msg.role === 'ai' ? 'LegacyZero' : msg.role} · ${formatTime(msg.createdAt)}</div>
        `;
        thread.appendChild(el);
      });
      thread.scrollTop = thread.scrollHeight;
    }

    // -----------------------------------------------------------------------
    // Realtime subscription helpers
    // -----------------------------------------------------------------------
    async function subscribeToTicket(ticketId) {
      // Unsubscribe from previous channel before subscribing to new one
      if (activeChannel) {
        try { await activeChannel.unsubscribe(); } catch (_) {}
        activeChannel = null;
      }

      if (IS_DEMO) return; // no-op in demo mode (supabase.ts returns mock channel)

      const { subscribeToTicket: subscribe } = await import('../services/supabase.ts');
      activeChannel = subscribe(ticketId, currentLocationId, (message) => {
        appendThreadBubble(message.role, message.content, message.id);
      });
    }

    // -----------------------------------------------------------------------
    // Load ticket into thread view
    // -----------------------------------------------------------------------
    async function loadTicket(ticket) {
      activeTicketId = ticket.id;
      renderedMsgIds.clear(); // reset dedup set for new ticket context

      document.getElementById('activeTicketId').textContent = ticket.id;
      document.getElementById('activeTicketSubject').textContent = ticket.title;
      document.getElementById('slaBadge').textContent = slaLabel(ticket.slaDeadline);

      const messages = (IS_DEMO ? DEMO_DATA.messages[ticket.id] : null) || [];
      renderThread(messages);

      document.getElementById('welcomeState').classList.add('hidden');
      document.getElementById('threadState').classList.remove('hidden');

      renderSidebar(IS_DEMO ? DEMO_DATA.tickets : []);

      // Subscribe to realtime updates for this ticket
      await subscribeToTicket(ticket.id);
    }

    // -----------------------------------------------------------------------
    // Intake state — conversation before a ticket exists
    // -----------------------------------------------------------------------
    let intakeMessages = [];   // { role, content, isInternal, createdAt }
    let aiResponseCount = 0;   // tracks # of AI turns in current intake
    let isSending = false;     // debounce guard

    // -----------------------------------------------------------------------
    // Demo: mock AI responses (no live API call)
    // -----------------------------------------------------------------------
    const DEMO_AI_RESPONSES = [
      "Thanks for reaching out. Can you tell me a bit more about the issue — when did it start and what exactly are you seeing?",
      "Got it. Is this affecting just you, or others on your team too?",
      "I have enough context now. I've flagged this as a priority issue and created a support ticket. An agent will follow up shortly — you can track progress right here.",
    ];

    const DEMO_TRIAGE_RESULT = {
      category: 'technical',
      priority: 'medium',
      problem: 'User-reported issue collected during intake conversation.',
      suggestedAction: 'Agent to review and follow up based on conversation context.',
    };

    async function mockAIResponse(index) {
      await new Promise(r => setTimeout(r, 400));
      return DEMO_AI_RESPONSES[Math.min(index, DEMO_AI_RESPONSES.length - 1)];
    }

    // -----------------------------------------------------------------------
    // Append a bubble to the welcome intake thread
    // (welcome state shows messages directly above the input)
    // -----------------------------------------------------------------------
    function appendIntakeBubble(role, content) {
      const wrap = document.getElementById('welcomeInputWrap');
      let thread = document.getElementById('intakeThread');
      if (!thread) {
        thread = document.createElement('div');
        thread.id = 'intakeThread';
        thread.className = 'intake-thread';
        wrap.parentElement.insertBefore(thread, wrap);
      }
      const el = document.createElement('div');
      el.className = `message-bubble bubble-${role}`;
      el.innerHTML = `
        <div class="bubble-content">${content}</div>
        <div class="bubble-meta">${role === 'ai' ? 'LegacyZero' : role} · ${formatTime(new Date())}</div>
      `;
      thread.appendChild(el);
      thread.scrollTop = thread.scrollHeight;
      return el;
    }

    // -----------------------------------------------------------------------
    // Show typing indicator
    // -----------------------------------------------------------------------
    function showTyping(parentId) {
      const thread = document.getElementById(parentId);
      const el = document.createElement('div');
      el.id = 'typingIndicator';
      el.className = 'message-bubble bubble-ai typing-indicator';
      el.innerHTML = `<div class="bubble-content"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      if (thread) thread.appendChild(el);
      return el;
    }

    function removeTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    // -----------------------------------------------------------------------
    // setSending — disable/enable inputs during async ops
    // -----------------------------------------------------------------------
    function setSending(val) {
      isSending = val;
      document.getElementById('welcomeSendBtn').disabled = val;
      document.getElementById('welcomeInput').disabled = val;
      document.getElementById('threadSendBtn').disabled = val;
      document.getElementById('threadInput').disabled = val;
    }

    // -----------------------------------------------------------------------
    // INTAKE FLOW — welcome state send
    // -----------------------------------------------------------------------
    async function handleWelcomeSend() {
      if (isSending) return;
      const input = document.getElementById('welcomeInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = '';
      setSending(true);

      // 1. Append client message
      const clientMsg = { id: `intake-${Date.now()}`, role: 'client', content: text, isInternal: false, createdAt: new Date() };
      intakeMessages.push(clientMsg);
      appendIntakeBubble('client', text);

      // 2. Show typing indicator
      let thread = document.getElementById('intakeThread');
      showTyping('intakeThread');

      try {
        // 3. Get AI reply
        let aiText;
        if (IS_DEMO) {
          aiText = await mockAIResponse(aiResponseCount);
        } else {
          const { continueConversation } = await import('../services/legacyzero.ts');
          aiText = await continueConversation(intakeMessages, text);
        }

        removeTyping();
        aiResponseCount++;

        const aiMsg = { id: `intake-ai-${Date.now()}`, role: 'ai', content: aiText, isInternal: false, createdAt: new Date() };
        intakeMessages.push(aiMsg);
        appendIntakeBubble('ai', aiText);

        // 4. After 3rd AI response → triage + create ticket → switch to thread mode
        if (aiResponseCount >= 3) {
          await createTicketFromIntake();
        }

      } catch (err) {
        removeTyping();
        appendIntakeBubble('ai', 'Sorry, something went wrong. Please try again.');
        console.error('[Intake] Error:', err);
      } finally {
        setSending(false);
        input.focus();
      }
    }

    // -----------------------------------------------------------------------
    // Create ticket from intake conversation
    // -----------------------------------------------------------------------
    async function createTicketFromIntake() {
      const firstClientMsg = intakeMessages.find(m => m.role === 'client');
      const title = firstClientMsg?.content.slice(0, 80) ?? 'New support request';

      let triage;
      if (IS_DEMO) {
        await new Promise(r => setTimeout(r, 300));
        triage = DEMO_TRIAGE_RESULT;
      } else {
        const { triageConversation } = await import('../services/legacyzero.ts');
        triage = await triageConversation(intakeMessages);
      }

      let newTicket;
      if (IS_DEMO) {
        // Synthesize a demo ticket from triage result
        newTicket = {
          id: `T-${Date.now().toString(36).toUpperCase()}`,
          ghlOpportunityId: `opp-${Date.now()}`,
          title,
          category: triage.category,
          priority: triage.priority,
          status: 'new',
          slaDeadline: new Date(Date.now() + 48 * 60 * 60 * 1000),
          createdAt: new Date(),
          updatedAt: new Date(),
        };
        // Seed messages from intake
        DEMO_DATA.messages[newTicket.id] = [...intakeMessages];
        DEMO_DATA.tickets.unshift(newTicket);
      } else {
        const { createTicket } = await import('../services/ghl.ts');
        newTicket = await createTicket({
          contactId: 'unknown', // real contactId injected post-auth
          title,
          category: triage.category,
          priority: triage.priority,
          summary: triage.problem,
        });
      }

      // Reset intake state
      intakeMessages = [];
      aiResponseCount = 0;

      // Switch to thread mode and load new ticket
      renderSidebar(IS_DEMO ? DEMO_DATA.tickets : [newTicket]);
      loadTicket(newTicket);

      // Clean up intake thread DOM
      document.getElementById('intakeThread')?.remove();
    }

    // -----------------------------------------------------------------------
    // THREAD FLOW — thread mode send
    // -----------------------------------------------------------------------
    async function handleThreadSend() {
      if (isSending || !activeTicketId) return;
      const input = document.getElementById('threadInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = '';
      setSending(true);

      // Get current thread messages
      const currentMessages = (IS_DEMO ? DEMO_DATA.messages[activeTicketId] : null) || [];

      const clientMsg = { id: `msg-${Date.now()}`, role: 'client', content: text, isInternal: false, createdAt: new Date() };

      // Append client bubble immediately — register ID so realtime echo is skipped
      appendThreadBubble('client', text, clientMsg.id);

      // Persist (demo: append to DEMO_DATA in-memory)
      if (IS_DEMO) {
        if (!DEMO_DATA.messages[activeTicketId]) DEMO_DATA.messages[activeTicketId] = [];
        DEMO_DATA.messages[activeTicketId].push(clientMsg);
      } else {
        const { addMessage } = await import('../services/supabase.ts');
        await addMessage(activeTicketId, 'client', text, currentLocationId, false);
      }

      // AI reply
      showTyping('messageThread');

      try {
        let aiText;
        if (IS_DEMO) {
          aiText = await mockAIResponse(Math.floor(Math.random() * 2));
        } else {
          const { continueConversation } = await import('../services/legacyzero.ts');
          aiText = await continueConversation([...currentMessages, clientMsg], text);
        }

        removeTyping();

        const aiMsg = { id: `msg-ai-${Date.now()}`, role: 'ai', content: aiText, isInternal: false, createdAt: new Date() };
        appendThreadBubble('ai', aiText, aiMsg.id);

        if (IS_DEMO) {
          DEMO_DATA.messages[activeTicketId].push(aiMsg);
        } else {
          const { addMessage } = await import('../services/supabase.ts');
          await addMessage(activeTicketId, 'ai', aiText, currentLocationId, false);
        }

      } catch (err) {
        removeTyping();
        appendThreadBubble('ai', 'Sorry, something went wrong. Please try again.');
        console.error('[Thread] Error:', err);
      } finally {
        setSending(false);
        input.focus();
      }
    }

    // -----------------------------------------------------------------------
    // Append bubble to thread mode (active ticket thread)
    // msgId: optional dedup key — if provided and already rendered, skip
    // -----------------------------------------------------------------------
    function appendThreadBubble(role, content, msgId = null) {
      if (msgId) {
        if (renderedMsgIds.has(msgId)) return; // already rendered (e.g. realtime echo)
        renderedMsgIds.add(msgId);
      }
      const thread = document.getElementById('messageThread');
      const el = document.createElement('div');
      el.className = `message-bubble bubble-${role}`;
      el.innerHTML = `
        <div class="bubble-content">${content}</div>
        <div class="bubble-meta">${role === 'ai' ? 'LegacyZero' : role} · ${formatTime(new Date())}</div>
      `;
      thread.appendChild(el);
      thread.scrollTop = thread.scrollHeight;
    }

    // -----------------------------------------------------------------------
    // Quick action pills — insert prompt text into thread input
    // -----------------------------------------------------------------------
    document.querySelectorAll('.quick-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const input = document.getElementById('threadInput');
        input.value = pill.dataset.prompt;
        input.focus();
      });
    });

    // -----------------------------------------------------------------------
    // Wire send buttons
    // -----------------------------------------------------------------------
    document.getElementById('welcomeSendBtn').addEventListener('click', handleWelcomeSend);
    document.getElementById('welcomeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleWelcomeSend(); }
    });

    document.getElementById('threadSendBtn').addEventListener('click', handleThreadSend);
    document.getElementById('threadInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleThreadSend(); }
    });

    // -----------------------------------------------------------------------
    // Auto-resize textareas
    // -----------------------------------------------------------------------
    ['threadInput', 'welcomeInput'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      });
    });

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    async function init() {
      await initAuth();

      if (IS_DEMO) {
        renderSidebar(DEMO_DATA.tickets);
        const first = DEMO_DATA.tickets.find(t => statusGroup(t.status) === 'open');
        if (first) loadTicket(first);
      }
    }

    init();
  </script>

</body>
</html>
