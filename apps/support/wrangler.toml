name = "legacy-fusion-support-worker"
main = "src/worker/support-proxy.ts"
compatibility_date = "2024-01-01"

# ---------------------------------------------------------------------------
# Non-secret vars — safe to commit per-environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { SUPPORT_CORS_ORIGIN = "https://support-staging.legacyfusion.ai" }

[env.production]
vars = { SUPPORT_CORS_ORIGIN = "https://support.legacyfusion.ai" }

# ---------------------------------------------------------------------------
# Secrets — set via Wrangler CLI, never committed:
#
#   wrangler secret put GHL_API_KEY
#   wrangler secret put GHL_PIPELINE_ID
#   wrangler secret put GHL_LOCATION_ID
#   wrangler secret put SUPPORT_CORS_ORIGIN    (if overriding [vars] above)
#
# Secret names (for reference only — no values here):
#   GHL_API_KEY         — GoHighLevel private API token
#   GHL_PIPELINE_ID     — GHL pipeline ID for the support pipeline
#   GHL_LOCATION_ID     — GHL location/sub-account ID
#   SUPPORT_CORS_ORIGIN — Allowed origin for CORS enforcement
# ---------------------------------------------------------------------------
