name = "legacy-fusion-support-worker"
main = "src/worker/support-proxy.ts"
compatibility_date = "2024-01-01"

# ---------------------------------------------------------------------------
# Build step — runs before wrangler deploy
# Compiles the Vite frontend into dist/
# ---------------------------------------------------------------------------
[build]
command = "npm run build"

# ---------------------------------------------------------------------------
# Static assets — served from the same Worker domain
# After `npm run build`, dist/ contains chat.html, control.html, and JS/CSS.
# wrangler deploys the Worker AND serves dist/ as static assets.
# No separate Cloudflare Pages project needed.
# ---------------------------------------------------------------------------
[assets]
directory = "dist"

# ---------------------------------------------------------------------------
# Non-secret per-environment vars
# ---------------------------------------------------------------------------
[env.staging]
vars = { SUPPORT_CORS_ORIGIN = "https://support-staging.legacyfusion.ai" }

[env.production]
vars = { SUPPORT_CORS_ORIGIN = "https://support.legacyfusion.ai" }

# ---------------------------------------------------------------------------
# Secrets — set via Wrangler CLI, never committed:
#
#   wrangler secret put GHL_AGENCY_TOKEN
#   wrangler secret put GHL_LOCATION_TOKEN
#   wrangler secret put GHL_LOCATION_ID
#   wrangler secret put GHL_WEBHOOK_SECRET
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put SUPPORT_CORS_ORIGIN    (if overriding [env.*] vars above)
#
# Secret names (for reference — no values here):
#   GHL_AGENCY_TOKEN          — GHL agency-level API token
#   GHL_LOCATION_TOKEN        — GHL location-level API token
#   GHL_LOCATION_ID           — GHL sub-account location ID
#   GHL_WEBHOOK_SECRET        — HMAC-SHA256 secret from GHL webhook config
#   SUPABASE_URL              — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — Supabase service-role key (server-side only)
#   SUPPORT_CORS_ORIGIN       — Allowed browser origin for CORS enforcement
# ---------------------------------------------------------------------------
